@startuml

entity author {
    <b><color:gold>PK</color></b> author_id : INTEGER
    - -
    last_name    : TEXT
    first_name   : TEXT
}

entity book {
    <b><color:gold>PK</color></b> isbn     : TEXT
    - -
    title       : TEXT
    pub_year    : INTEGER
}

entity writes {
    <b><color:gold>PK</color></b> <i><color:gray>FK</color></i> author_id : INTEGER
    <b><color:gold>PK</color></b> <i><color:gray>FK</color></i> isbn      : TEXT
}

entity copy {
    <b><color:gold>PK</color></b> copy_no  : INTEGER
    - -
    <i><color:gray>FK</color></i> isbn     : TEXT
    shelf_loc   : TEXT
}

entity member {
    <b><color:gold>PK</color></b> member_no   : INTEGER
    - -
    full_name      : TEXT
    email          : TEXT <<UNIQUE>>
    enrolled_on    : DATE
}

entity loan {
    <b><color:gold>PK</color></b> loan_id     : INTEGER
    - -
    <i><color:gray>FK</color></i> member_no   : INTEGER
    <i><color:gray>FK</color></i> copy_no     : INTEGER
    loan_date      : DATE
    return_date    : DATE <<nullable>>
}

author   ||- -o{ writes : writes
book     ||- -o{ writes : written by
book     ||- -|{ copy   : available as
member   ||- -o{ loan   : places
copy     ||- -o{ loan   : borrowed in
@enduml

